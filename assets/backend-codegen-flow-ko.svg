<svg width="1460" height="1040" viewBox="0 0 1460 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">jakal-flow 백엔드 코드 생성 흐름</title>
  <desc id="desc">jakal-flow가 프로젝트를 격리하고, 실행 계획을 만들고, Codex 패스를 실행하고, 변경을 검증하고, 실패를 복구하고, 산출물을 저장하는 백엔드 중심 다이어그램.</desc>
  <defs>
    <linearGradient id="bg" x1="36" y1="28" x2="1424" y2="1012" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F4EE"/>
      <stop offset="0.55" stop-color="#F2F8FF"/>
      <stop offset="1" stop-color="#EEF8F1"/>
    </linearGradient>
    <linearGradient id="band" x1="42" y1="186" x2="1418" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF5FF"/>
      <stop offset="1" stop-color="#F5FBF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#203040" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#60748A"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Bahnschrift', 'Malgun Gothic', sans-serif; fill: #172433; }
      .subtitle { font: 500 16px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #4F6275; }
      .section { font: 700 13px 'Segoe UI', 'Bahnschrift', sans-serif; letter-spacing: 0.12em; fill: #294055; }
      .panelTitle { font: 700 19px 'Segoe UI', 'Bahnschrift', 'Malgun Gothic', sans-serif; fill: #162636; }
      .body { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #4C6074; }
      .mono { font: 700 9.5px 'Consolas', 'Courier New', monospace; fill: #1F3447; }
      .chipLabel { font: 700 11px 'Segoe UI', 'Bahnschrift', sans-serif; fill: #FFFFFF; }
      .chipText { font: 600 9px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: rgba(255,255,255,0.92); }
      .panel { fill: #FFFFFF; stroke: #D6E1EB; stroke-width: 1.5; filter: url(#shadow); }
      .soft { fill: #FFFFFF; stroke: #D6E1EB; stroke-width: 1.2; }
      .line { stroke: #60748A; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #D6E1EB; stroke-width: 1.4; stroke-linecap: round; }
      .dash { stroke: #A8BACB; stroke-width: 1.6; stroke-linecap: round; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect x="16" y="16" width="1428" height="1008" rx="28" fill="url(#bg)"/>

  <text x="44" y="72" class="title">jakal-flow: 백엔드 코드 생성 흐름</text>
  <text x="44" y="100" class="subtitle">UI는 진입 표면일 뿐이고, 핵심 경로는 Python 오케스트레이션 코어에 있다.</text>
  <text x="44" y="124" class="subtitle">계획 생성, 실행, 검증, 롤백, 리포트는 저장소별로 격리해 유지한다.</text>

  <rect x="44" y="146" width="156" height="34" rx="12" fill="#1D4ED8"/>
  <text x="60" y="167" class="chipLabel">계획</text>
  <text x="102" y="167" class="chipText">프롬프트 조립</text>

  <rect x="212" y="146" width="176" height="34" rx="12" fill="#0F766E"/>
  <text x="228" y="167" class="chipLabel">실행</text>
  <text x="268" y="167" class="chipText">Codex 패스</text>

  <rect x="400" y="146" width="186" height="34" rx="12" fill="#B45309"/>
  <text x="416" y="167" class="chipLabel">검증</text>
  <text x="458" y="167" class="chipText">캐시와 디버거</text>

  <rect x="598" y="146" width="198" height="34" rx="12" fill="#475569"/>
  <text x="614" y="167" class="chipLabel">저장</text>
  <text x="656" y="167" class="chipText">로그, 메모리, 리포트</text>

  <rect x="44" y="192" width="1372" height="74" rx="18" fill="url(#band)" stroke="#D6E1EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="64" y="218" class="section">진입점과 런타임</text>
  <line x1="64" y1="228" x2="1396" y2="228" class="divider"/>

  <rect x="68" y="240" width="426" height="16" rx="8" fill="#1D4ED8"/>
  <text x="82" y="252" class="chipLabel">시작점</text>
  <text x="136" y="252" class="chipText">CLI run/resume 또는 bridge 명령</text>

  <rect x="518" y="240" width="458" height="16" rx="8" fill="#0F766E"/>
  <text x="532" y="252" class="chipLabel">런타임</text>
  <text x="592" y="252" class="chipText">모델, 공급자, 추론 강도, 샌드박스, 승인, 체크포인트</text>

  <rect x="1000" y="240" width="392" height="16" rx="8" fill="#B45309"/>
  <text x="1014" y="252" class="chipLabel">검증 계약</text>
  <text x="1078" y="252" class="chipText">test_cmd, 롤백, 선택적 push, PR 실패 번들</text>

  <rect x="40" y="286" width="260" height="460" rx="20" class="panel"/>
  <text x="60" y="314" class="section">1. 프로젝트 격리</text>

  <rect x="58" y="336" width="224" height="94" rx="14" fill="#F5F9FF" stroke="#C9D9EE"/>
  <text x="74" y="360" class="panelTitle">WorkspaceManager</text>
  <text x="74" y="382" class="mono">build_paths()</text>
  <text x="74" y="402" class="body">저장소마다 별도 프로젝트 루트를 만들고</text>
  <text x="74" y="418" class="body">docs, logs, memory, reports,</text>
  <text x="74" y="434" class="body">state 디렉터리를 분리한다.</text>

  <rect x="58" y="446" width="224" height="112" rx="14" fill="#F6FCFA" stroke="#CAE8DF"/>
  <text x="74" y="470" class="panelTitle">setup_local_project()</text>
  <text x="74" y="490" class="body">또는 init_repo()</text>
  <text x="74" y="512" class="body">저장소를 연결하거나 clone하고,</text>
  <text x="74" y="528" class="body">venv와 gitignore를 준비하고,</text>
  <text x="74" y="544" class="body">git identity를 설정한 뒤 현재</text>
  <text x="74" y="560" class="body">safe revision을 기록한다.</text>

  <rect x="58" y="574" width="224" height="136" rx="14" fill="#FFF9F1" stroke="#EFDABD"/>
  <text x="74" y="598" class="panelTitle">초기 메타데이터</text>
  <text x="74" y="620" class="mono">metadata.json</text>
  <text x="74" y="636" class="mono">project_config.json</text>
  <text x="74" y="652" class="mono">state/LOOP_STATE.json</text>
  <text x="74" y="674" class="body">오케스트레이터는 저장소 식별자,</text>
  <text x="74" y="690" class="body">현재 상태, 카운터, 체크포인트,</text>
  <text x="74" y="706" class="body">safe revision을 저장소 밖에 둔다.</text>

  <rect x="318" y="286" width="286" height="460" rx="20" class="panel"/>
  <text x="338" y="314" class="section">2. 계획 컴파일러</text>

  <rect x="338" y="336" width="246" height="84" rx="14" fill="#F5F9FF" stroke="#C9D9EE"/>
  <text x="354" y="360" class="panelTitle">scan_repository_inputs()</text>
  <text x="354" y="382" class="body">README, AGENTS, repo/docs를 읽어</text>
  <text x="354" y="398" class="body">계획용 압축 컨텍스트를 만든다.</text>

  <rect x="338" y="436" width="246" height="92" rx="14" fill="#F2F7FF" stroke="#C7D8F2"/>
  <text x="354" y="460" class="panelTitle">planning.py</text>
  <text x="354" y="482" class="mono">prompt_to_plan_decomposition_prompt()</text>
  <text x="354" y="498" class="mono">prompt_to_execution_plan_prompt()</text>
  <text x="354" y="518" class="body">저장소 컨텍스트와 런타임 모드로</text>
  <text x="354" y="534" class="body">Planner A/B 프롬프트를 조립한다.</text>

  <rect x="338" y="544" width="246" height="100" rx="14" fill="#EEF5FF" stroke="#C7D8F2"/>
  <text x="354" y="568" class="panelTitle">CodexRunner.run_pass()</text>
  <text x="354" y="590" class="body">계획 단계는 두 패스로 나뉜다.</text>
  <text x="354" y="606" class="mono">plan-agent-a-decomposition</text>
  <text x="354" y="622" class="mono">plan-agent-b-packing</text>
  <text x="354" y="642" class="body">각 패스는 prompt, JSON events,</text>
  <text x="354" y="658" class="body">output, diagnostics를 로그에 남긴다.</text>

  <rect x="338" y="660" width="246" height="68" rx="14" fill="#F5FBF6" stroke="#CAE6D3"/>
  <text x="354" y="684" class="panelTitle">save_execution_plan_state()</text>
  <text x="354" y="706" class="body">DAG를 정규화하고 step id를 정리한 뒤</text>
  <text x="354" y="722" class="body">저장형 계획 산출물을 만든다.</text>

  <rect x="622" y="286" width="286" height="460" rx="20" class="panel"/>
  <text x="642" y="314" class="section">3. 블록 실행기</text>

  <rect x="642" y="336" width="246" height="84" rx="14" fill="#F6FCFA" stroke="#CAE8DF"/>
  <text x="658" y="360" class="panelTitle">run() -&gt; _run_single_block()</text>
  <text x="658" y="382" class="body">block_index를 올리고, 중단 한계를</text>
  <text x="658" y="398" class="body">확인하며, 체크포인트 승인을 게이트한다.</text>

  <rect x="642" y="436" width="246" height="100" rx="14" fill="#F7FCF8" stroke="#CAE8DF"/>
  <text x="658" y="460" class="panelTitle">후보 작업 선택</text>
  <text x="658" y="482" class="mono">_plan_block_items()</text>
  <text x="658" y="498" class="mono">MemoryStore.render_context()</text>
  <text x="658" y="518" class="body">MID_TERM_PLAN을 만들고 후보 작업을</text>
  <text x="658" y="534" class="body">점수화한 뒤 ACTIVE_TASK.md를 쓴다.</text>

  <rect x="642" y="552" width="246" height="86" rx="14" fill="#F0FBF8" stroke="#CAE8DF"/>
  <text x="658" y="576" class="panelTitle">implementation_prompt()</text>
  <text x="658" y="598" class="body">계획, scope guard, 작업, 메모리,</text>
  <text x="658" y="614" class="body">성공 기준, step 규칙을 프롬프트에 넣는다.</text>

  <rect x="642" y="654" width="246" height="88" rx="14" fill="#ECFDF5" stroke="#BFE5D2"/>
  <text x="658" y="678" class="panelTitle">실행 패스</text>
  <text x="658" y="700" class="mono">CodexRunner.run_pass(</text>
  <text x="658" y="714" class="mono">search_enabled=True)</text>
  <text x="658" y="730" class="body">repo_dir 안에서 codex exec --json을 호출한다.</text>

  <rect x="926" y="286" width="494" height="460" rx="20" class="panel"/>
  <text x="946" y="314" class="section">4. 검증, 복구, 기록</text>
  <line x1="1172" y1="336" x2="1172" y2="726" class="dash"/>

  <rect x="946" y="336" width="206" height="88" rx="14" fill="#FFF9F3" stroke="#EFD7C2"/>
  <text x="962" y="360" class="panelTitle">VerificationRunner.run()</text>
  <text x="962" y="382" class="body">git HEAD, dirty tree, 환경 lockfile,</text>
  <text x="962" y="398" class="body">test_cmd로 cache key를 계산한다.</text>
  <text x="962" y="414" class="body">지문이 같으면 이전 검증 로그를 재생한다.</text>

  <rect x="946" y="440" width="206" height="118" rx="14" fill="#FFF7F5" stroke="#F0D0CA"/>
  <text x="962" y="464" class="panelTitle">실패 복구</text>
  <text x="962" y="486" class="mono">_run_debugger_pass()</text>
  <text x="962" y="506" class="body">검증 실패 시 debugger prompt에</text>
  <text x="962" y="522" class="body">실패 로그를 넣어 복구를 시도한다.</text>
  <text x="962" y="538" class="body">복구에도 실패하면 GitOps가 저장한</text>
  <text x="962" y="554" class="body">safe revision으로 repo를 되돌린다.</text>

  <rect x="946" y="574" width="206" height="94" rx="14" fill="#F5FBF6" stroke="#CAE6D3"/>
  <text x="962" y="598" class="panelTitle">성공 경로</text>
  <text x="962" y="620" class="mono">git.commit_all()</text>
  <text x="962" y="636" class="mono">current_safe_revision = commit</text>
  <text x="962" y="656" class="body">검증된 커밋과 origin remote가 있을 때만</text>
  <text x="962" y="672" class="body">선택적으로 push가 일어난다.</text>

  <rect x="946" y="684" width="206" height="42" rx="14" fill="#EEF4FF" stroke="#CDDCEF"/>
  <text x="962" y="710" class="body">closeout은 별도의 finalization prompt와 검증 패스를 사용한다.</text>

  <rect x="1192" y="336" width="208" height="172" rx="14" fill="#F3F8FF" stroke="#CADAF0"/>
  <text x="1208" y="360" class="panelTitle">병렬 DAG 분기</text>
  <text x="1208" y="382" class="mono">pending_execution_batches()</text>
  <text x="1208" y="404" class="body">ready step을 의존성과 hard owned-path</text>
  <text x="1208" y="420" class="body">충돌 기준으로 묶는다.</text>
  <text x="1208" y="440" class="body">각 worker는 git worktree 안에서</text>
  <text x="1208" y="456" class="body">자기 docs, memory, logs, reports,</text>
  <text x="1208" y="472" class="body">state 디렉터리를 따로 사용한다.</text>
  <text x="1208" y="492" class="body">worker commit을 cherry-pick으로 합친 뒤</text>
  <text x="1208" y="508" class="body">병합 결과를 다시 검증한다.</text>

  <rect x="1192" y="526" width="208" height="120" rx="14" fill="#F6FCFA" stroke="#CAE8DF"/>
  <text x="1208" y="550" class="panelTitle">Reporter + MemoryStore</text>
  <text x="1208" y="572" class="body">패스 로그, 블록 로그, 테스트 런,</text>
  <text x="1208" y="588" class="body">attempt history, block review,</text>
  <text x="1208" y="604" class="body">task memory summary를 기록한다.</text>
  <text x="1208" y="624" class="body">실패 번들은 GitHub PR 코멘트로도</text>
  <text x="1208" y="640" class="body">보낼 수 있다.</text>

  <rect x="1192" y="652" width="208" height="74" rx="14" fill="#FFF7F5" stroke="#F0D0CA"/>
  <text x="1208" y="676" class="panelTitle">실패 산출물</text>
  <text x="1208" y="698" class="mono">reports/*.prfail.json / .md</text>
  <text x="1208" y="712" class="mono">reports/latest_pr_</text>
  <text x="1208" y="726" class="mono">failure_status.json</text>

  <path d="M281 497H318" class="line"/>
  <path d="M604 497H622" class="line"/>
  <path d="M908 497H926" class="line"/>
  <path d="M174 256V286" class="line"/>

  <path d="M477 728V792" class="line"/>
  <path d="M764 742V792" class="line"/>
  <path d="M1102 728V792" class="line"/>
  <path d="M1296 508V526" class="line"/>

  <rect x="40" y="780" width="1380" height="216" rx="20" class="panel"/>
  <text x="60" y="808" class="section">프로젝트별 영속 산출물</text>
  <text x="60" y="830" class="body">백엔드는 실행 추적성을 저장소 작업 트리 밖에 유지하고, 검증된 커밋을 통해서만 저장소를 갱신한다.</text>

  <rect x="58" y="850" width="238" height="122" rx="14" class="soft"/>
  <text x="74" y="876" class="panelTitle">docs/</text>
  <text x="74" y="898" class="mono">PLAN.md</text>
  <text x="74" y="914" class="mono">MID_TERM_PLAN.md</text>
  <text x="74" y="930" class="mono">ACTIVE_TASK.md</text>
  <text x="74" y="946" class="mono">EXECUTION_FLOW.svg</text>
  <text x="74" y="962" class="mono">CLOSEOUT_REPORT.md</text>

  <rect x="316" y="850" width="238" height="122" rx="14" class="soft"/>
  <text x="332" y="876" class="panelTitle">logs/</text>
  <text x="332" y="898" class="mono">block_000x/*.prompt.md</text>
  <text x="332" y="914" class="mono">block_000x/*.events.jsonl</text>
  <text x="332" y="930" class="mono">passes.jsonl</text>
  <text x="332" y="946" class="mono">blocks.jsonl</text>
  <text x="332" y="962" class="mono">test_runs.jsonl</text>

  <rect x="574" y="850" width="238" height="122" rx="14" class="soft"/>
  <text x="590" y="876" class="panelTitle">memory/</text>
  <text x="590" y="898" class="mono">success_patterns.jsonl</text>
  <text x="590" y="914" class="mono">failure_patterns.jsonl</text>
  <text x="590" y="930" class="mono">task_summaries.jsonl</text>
  <text x="590" y="952" class="body">다음 블록 선택과 복구 컨텍스트의</text>
  <text x="590" y="968" class="body">재료로 다시 사용된다.</text>

  <rect x="832" y="850" width="238" height="122" rx="14" class="soft"/>
  <text x="848" y="876" class="panelTitle">reports/</text>
  <text x="848" y="898" class="mono">latest_report.json</text>
  <text x="848" y="914" class="mono">*.prfail.json</text>
  <text x="848" y="930" class="mono">*.prfail.md</text>
  <text x="848" y="946" class="mono">CLOSEOUT_REPORT.docx</text>
  <text x="848" y="968" class="body">기계 읽기용 상태와 공유 가능한</text>
  <text x="848" y="984" class="body">실패 번들이 여기에 쌓인다.</text>

  <rect x="1090" y="850" width="312" height="122" rx="14" class="soft"/>
  <text x="1106" y="876" class="panelTitle">state/</text>
  <text x="1106" y="898" class="mono">EXECUTION_PLAN.json</text>
  <text x="1106" y="914" class="mono">CHECKPOINTS.json</text>
  <text x="1106" y="930" class="mono">verification_cache/*</text>
  <text x="1106" y="946" class="mono">LOOP_STATE.json</text>
  <text x="1106" y="962" class="mono">ML_MODE_STATE.json</text>
  <text x="1106" y="984" class="body">resume, status, checkpoint review를 이 상태가 구동한다.</text>
</svg>
