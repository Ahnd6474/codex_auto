<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="1160" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EB"/>
      <stop offset="1" stop-color="#E8F0F7"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="220" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="520" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="panelC" x1="0" y1="0" x2="300" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="170" y2="90" gradientUnits="userSpaceOnUse">
