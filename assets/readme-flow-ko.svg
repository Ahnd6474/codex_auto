      <text x="75" y="39" text-anchor="middle" fill="white" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">초기화</text>
    </g>
    <g filter="url(#shadow)" transform="translate(640 90)">
      <rect width="150" height="64" rx="20" fill="url(#cardRose)"/>
      <text x="75" y="39" text-anchor="middle" fill="white" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700">체크포인트</text>
    </g>
