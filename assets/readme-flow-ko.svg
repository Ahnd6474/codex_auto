      <text x="85" y="40" text-anchor="middle" fill="white" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="25" font-weight="700">실행</text>
    </g>
    <g filter="url(#shadow)" transform="translate(946 351)">
