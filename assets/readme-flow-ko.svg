    <text x="362" y="195" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14">workspace/projects/&lt;repo_slug&gt;</text>

    <rect x="362" y="220" width="160" height="74" rx="20" fill="white" stroke="#93C5FD"/>
    <text x="442" y="252" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">repo/</text>
    <text x="442" y="274" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">clone</text>

    <rect x="544" y="220" width="160" height="74" rx="20" fill="white" stroke="#93C5FD"/>
    <text x="624" y="252" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">docs/</text>
