    <text x="789" y="252" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">state</text>
    <text x="789" y="274" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">safe rev</text>

    <rect x="362" y="320" width="160" height="74" rx="20" fill="white" stroke="#93C5FD"/>
    <text x="442" y="352" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">memory</text>
    <text x="442" y="374" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">success / fail</text>

    <rect x="544" y="320" width="160" height="74" rx="20" fill="white" stroke="#93C5FD"/>
    <text x="624" y="352" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">logs</text>
    <text x="624" y="374" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">passes / blocks</text>

    <rect x="726" y="320" width="126" height="74" rx="20" fill="white" stroke="#93C5FD"/>
    <text x="789" y="352" text-anchor="middle" fill="#1E3A8A" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">report</text>
    <text x="789" y="374" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">latest</text>
  </g>

  <g>
