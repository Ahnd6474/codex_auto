    <text x="175" y="248" text-anchor="middle" fill="#9A3412" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13">url / branch</text>

    <rect x="78" y="285" width="194" height="106" rx="20" fill="white" stroke="#FDBA74"/>
