  <text x="60" y="98" fill="#4B5563" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="15">입력 → 관리 프로젝트 → 실행 루프 → 기록 / 체크포인트</text>

  <g>
