  <path d="M300 252H348" stroke="#355070" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M300 338H430V154" stroke="#355070" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M580 122H640" stroke="#355070" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M790 154H866C894 154 894 227 938 227" stroke="#355070" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M852 357H900C922 357 922 383 938 383" stroke="#355070" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M790 122V110" stroke="#355070" stroke-width="5" stroke-linecap="round"/>

  <text x="600" y="458" text-anchor="middle" fill="#475569" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="600">각 저장소는 독립된 프로젝트 폴더와 로그, 메모리, 상태를 유지</text>
